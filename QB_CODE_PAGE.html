<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCP Sales Portal</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a1a1a}
.loader{display:flex;align-items:center;justify-content:center;height:100%;color:#a0a0a0;font-family:system-ui;flex-direction:column}
.spinner{width:24px;height:24px;border:2px solid #333;border-top-color:#68B6E5;border-radius:50%;animation:s .8s linear infinite;margin-bottom:12px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spinner"></div>Loading...</div>
<script>
var REPO = 'lcp-media-quickbase/lcp-sales-portal';
function fetchRetry(url, n, d) {
  return fetch(url).then(function(r) {
    if (!r.ok) {
      if (n > 0) return new Promise(function(ok){setTimeout(ok,d);}).then(function(){return fetchRetry(url,n-1,d*2);});
      throw new Error(url.split('/').pop() + ' ' + r.status);
    }
    return r;
  });
}
// Step 1: Get version
fetchRetry('https://raw.githubusercontent.com/' + REPO + '/main/codepages/version.json?_=' + Date.now(), 2, 1000)
  .then(function(r) { return r.json(); })
  .catch(function() { return { version: 'main' }; })
  .then(function(cfg) {
    var v = cfg.version || 'main';
    var CDN = 'https://cdn.jsdelivr.net/gh/' + REPO + '@' + v + '/codepages';
    document.getElementById('loader').lastChild.textContent = 'Loading ' + v + '...';
    // Step 2: Load all files
    return Promise.all([
      fetchRetry(CDN + '/shared.css', 2, 1000).then(function(r){return r.text();}),
      fetchRetry(CDN + '/shared.js', 2, 1000).then(function(r){return r.text();}),
      fetchRetry(CDN + '/app.js', 2, 1000).then(function(r){return r.text();}),
      fetchRetry(CDN + '/dashboard.html', 2, 1000).then(function(r){return r.text();})
    ]);
  })
  .then(function(res) {
    var css = res[0], sharedJs = res[1], appJs = res[2], html = res[3];
    // Parse HTML to get body content only (strip scripts)
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    // Remove loader, inject styles
    document.getElementById('loader').remove();
    var styleEl = document.createElement('style');
    styleEl.textContent = css;
    document.head.appendChild(styleEl);
    // Copy any inline styles from dashboard.html head
    doc.querySelectorAll('head style').forEach(function(s) {
      document.head.appendChild(s.cloneNode(true));
    });
    // Copy body content (without script tags)
    var bodyContent = doc.body.innerHTML;
    // Remove script tags from body content
    bodyContent = bodyContent.replace(/<script[\s\S]*?<\/script>/gi, '');
    document.body.innerHTML = bodyContent;
    // Execute scripts in order: shared.js, app.js, then buildDashboard()
    var s1 = document.createElement('script');
    s1.textContent = sharedJs;
    document.body.appendChild(s1);
    var s2 = document.createElement('script');
    s2.textContent = appJs;
    document.body.appendChild(s2);
    var s3 = document.createElement('script');
    s3.textContent = 'buildDashboard();';
    document.body.appendChild(s3);
  }).catch(function(e) {
    document.getElementById('loader').innerHTML =
      '<div style="color:#ef4444;font-size:14px">Failed to load: ' + e.message + '</div>' +
      '<div style="color:#a0a0a0;font-size:12px;margin-top:8px">Try refreshing (Ctrl+Shift+R)</div>';
  });
</script>
</body>
</html>
